<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Greenhouse Console - Create Lead</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#b4c5ff",
                    "error-container": "#ffdad6",
                    "secondary-container": "#d5e3fc",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed": "#00174b",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#f0f0fb",
                    "surface-container-low": "#f3f3fe",
                    "on-surface-variant": "#434655",
                    "surface-container-highest": "#e1e2ed",
                    "surface-variant": "#e1e2ed",
                    "secondary-fixed-dim": "#b9c7df",
                    "surface-dim": "#d9d9e5",
                    "outline-variant": "#c3c6d7",
                    "surface-bright": "#faf8ff",
                    "surface-container": "#ededf9",
                    "on-error": "#ffffff",
                    "on-primary-container": "#eeefff",
                    "tertiary-container": "#bc4800",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#57657a",
                    "tertiary-fixed-dim": "#ffb596",
                    "outline": "#737686",
                    "tertiary-fixed": "#ffdbcd",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#b4c5ff",
                    "tertiary": "#943700",
                    "on-tertiary-fixed": "#360f00",
                    "on-secondary-fixed-variant": "#3a485b",
                    "on-primary": "#ffffff",
                    "surface-tint": "#0053db",
                    "on-tertiary-container": "#ffede6",
                    "on-background": "#191b23",
                    "surface": "#faf8ff",
                    "inverse-surface": "#2e3039",
                    "surface-container-high": "#e7e7f3",
                    "on-secondary-fixed": "#0d1c2e",
                    "background": "#faf8ff",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#191b23",
                    "primary-fixed": "#dbe1ff",
                    "primary-container": "#2563eb",
                    "primary": "#004ac6",
                    "secondary": "#515f74",
                    "secondary-fixed": "#d5e3fc"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "md": "16px",
                    "unit": "4px",
                    "touch-target": "44px",
                    "sm": "8px",
                    "xs": "4px",
                    "xl": "32px",
                    "margin": "32px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "label-sm": ["Inter"],
                    "h2": ["Inter"],
                    "h3": ["Inter"],
                    "body-md": ["Inter"],
                    "h1": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "h3": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "h1": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex antialiased">
<!-- Navigation Shell: Hidden as this is a transactional form (Creation/Edit) -->
<!-- Main Canvas -->
<main class="flex-1 flex flex-col h-screen overflow-hidden">
<!-- Header -->
<header class="flex justify-between items-center h-[64px] px-lg w-full border-b border-outline-variant bg-surface shrink-0">
<div class="flex items-center gap-md">
<button class="h-touch-target w-touch-target flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-high focus-within:ring-2 focus-within:ring-primary focus:outline-none">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-h2 text-h2 text-on-surface">Create New Lead</h1>
</div>
<div class="flex items-center gap-md">
<button class="h-touch-target px-md rounded-lg text-secondary border border-outline-variant hover:bg-surface-container-high font-label-md text-label-md transition-colors focus:outline-none focus-within:ring-2 focus-within:ring-primary">
                    Cancel
                </button>
<button class="h-touch-target px-lg rounded-lg bg-primary-container text-on-primary font-label-md text-label-md hover:bg-primary transition-colors focus:outline-none focus-within:ring-2 focus-within:ring-primary-container ring-offset-2 ring-offset-background">
                    Save Lead
                </button>
</div>
</header>
<!-- Scrollable Form Area -->
<div class="flex-1 overflow-y-auto p-margin bg-surface-container-lowest">
<div class="max-w-[800px] mx-auto space-y-xl">
<!-- Section 1: Basic Information -->
<section class="bg-surface border border-surface-variant rounded-xl p-lg">
<h2 class="font-h3 text-h3 text-on-surface mb-md">Basic Information</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Input: First Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="first_name">First Name</label>
<input class="h-touch-target rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow" id="first_name" placeholder="e.g. Jane" type="text"/>
</div>
<!-- Input: Last Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="last_name">Last Name</label>
<input class="h-touch-target rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow" id="last_name" placeholder="e.g. Doe" type="text"/>
</div>
<!-- Input: Company -->
<div class="flex flex-col gap-xs md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="company">Company</label>
<input class="h-touch-target rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow" id="company" placeholder="e.g. Acme Corp" type="text"/>
</div>
<!-- Input: Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input class="h-touch-target rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow" id="email" placeholder="jane@example.com" type="email"/>
</div>
<!-- Input: Phone -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="phone">Phone Number</label>
<input class="h-touch-target rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow" id="phone" placeholder="(555) 123-4567" type="tel"/>
</div>
</div>
</section>
<!-- Section 2: Deal Details -->
<section class="bg-surface border border-surface-variant rounded-xl p-lg">
<h2 class="font-h3 text-h3 text-on-surface mb-md">Deal Details</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Select: Source -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="source">Lead Source</label>
<div class="relative">
<select class="w-full h-touch-target appearance-none rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow pr-xl" id="source">
<option disabled="" selected="" value="">Select source...</option>
<option value="website">Website Form</option>
<option value="referral">Referral</option>
<option value="trade_show">Trade Show</option>
<option value="cold_call">Cold Call</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-sm text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Input: Estimated Value -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="value">Estimated Value ($)</label>
<input class="h-touch-target rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow" id="value" placeholder="0.00" type="number"/>
</div>
<!-- Select: Status -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="status">Initial Status</label>
<div class="relative">
<select class="w-full h-touch-target appearance-none rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow pr-xl" id="status">
<option value="new">New</option>
<option value="contacted">Contacted</option>
<option value="qualified">Qualified</option>
<option value="proposal">Proposal</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-sm text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Input: Date -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="date">Next Action Date</label>
<input class="h-touch-target rounded-lg border border-outline-variant bg-surface px-md font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow" id="date" type="date"/>
</div>
</div>
</section>
<!-- Section 3: Notes -->
<section class="bg-surface border border-surface-variant rounded-xl p-lg">
<h2 class="font-h3 text-h3 text-on-surface mb-md">Additional Information</h2>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="notes">Next Action / Notes</label>
<textarea class="rounded-lg border border-outline-variant bg-surface p-md font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-2 focus:ring-primary focus:outline-none transition-shadow resize-y" id="notes" placeholder="Enter details about next steps or context..." rows="4"></textarea>
</div>
</section>
</div>
</div>
</main>
</body></html>
